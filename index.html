<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOEG Farm Team</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #151820;
    --surface2: #1c2030;
    --border: #2a2f3d;
    --accent: #e8c84a;
    --accent2: #4ae8a0;
    --danger: #e84a4a;
    --text: #e8eaf0;
    --muted: #6b7280;
    --card-h: 340px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-badge {
    background: var(--accent);
    color: var(--bg);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 1px;
    font-weight: 500;
    margin-top: 3px;
  }

  .header-actions { display: flex; gap: 10px; align-items: center; }

  .view-toggle {
    display: flex;
    background: var(--bg);
    border-radius: 6px;
    padding: 3px;
    border: 1px solid var(--border);
  }

  .view-btn {
    padding: 5px 12px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }

  .view-btn.active {
    background: var(--surface2);
    color: var(--accent);
  }

  /* MAIN LAYOUT */
  .layout { display: flex; height: calc(100vh - 60px); }

  /* SIDEBAR */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }

  .sidebar-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    padding: 10px 16px 6px;
    text-transform: uppercase;
  }

  .owner-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    position: relative;
  }

  .owner-item:hover { background: var(--surface2); }
  .owner-item.active {
    border-left-color: var(--accent);
    background: var(--surface2);
  }

  .owner-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .owner-name {
    font-size: 14px;
    font-weight: 500;
  }

  .owner-count {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 1px 6px;
    border-radius: 10px;
  }

  /* CONTENT */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* GRID VIEW */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 18px;
  }

  /* TEAM CARD */
  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }

  .team-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .team-card-header {
    padding: 14px 16px 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
  }

  .team-card-avatar {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .team-card-info { flex: 1; }
  .team-card-owner { font-weight: 600; font-size: 15px; }
  .team-card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .team-card-edit {
    padding: 5px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    transition: all 0.15s;
  }
  .team-card-edit:hover { border-color: var(--accent); color: var(--accent); }

  .team-card-roster {
    padding: 10px 0;
    max-height: 260px;
    overflow-y: auto;
  }

  .roster-item {
    display: flex;
    align-items: center;
    padding: 5px 16px;
    gap: 10px;
    transition: background 0.1s;
    cursor: default;
  }

  .roster-item:hover { background: var(--surface2); }

  .roster-rank {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 22px;
    text-align: right;
    flex-shrink: 0;
  }

  .roster-name { font-size: 13px; font-weight: 400; flex: 1; }

  .roster-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .tag-ptbn {
    background: rgba(232, 200, 74, 0.12);
    color: var(--accent);
    border: 1px solid rgba(232, 200, 74, 0.3);
  }

  .tag-player {
    background: rgba(74, 232, 160, 0.08);
    color: var(--accent2);
    border: 1px solid rgba(74, 232, 160, 0.2);
  }

  /* SINGLE TEAM VIEW */
  .single-view { max-width: 700px; margin: 0 auto; }

  .team-header-full {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 28px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
  }

  .team-header-avatar-lg {
    width: 64px;
    height: 64px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--bg);
  }

  .team-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; }
  .team-subtitle { color: var(--muted); font-size: 14px; margin-top: 2px; }

  .roster-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .section-title {
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .roster-full-item {
    display: flex;
    align-items: center;
    padding: 11px 20px;
    gap: 14px;
    border-bottom: 1px solid rgba(42,47,61,0.5);
    transition: background 0.1s;
  }

  .roster-full-item:last-child { border-bottom: none; }
  .roster-full-item:hover { background: var(--surface2); }

  .roster-full-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    width: 30px;
    text-align: center;
  }

  .roster-full-name { font-size: 15px; font-weight: 500; flex: 1; }

  /* ALL TEAMS VIEW */
  .all-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* DRAFT VIEW */
  .draft-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .draft-column {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .draft-col-header {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
  }

  .draft-col-avatar {
    width: 26px;
    height: 26px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    color: var(--bg);
    flex-shrink: 0;
  }

  .draft-col-name { font-size: 13px; font-weight: 600; }

  .draft-pick-list { padding: 8px 0; }

  .draft-pick {
    padding: 6px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pick-year {
    width: 38px;
    color: var(--accent);
    font-weight: 500;
  }

  .pick-from {
    color: var(--muted);
    font-size: 10px;
  }

  /* SEARCH + FILTER BAR */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .search-box {
    flex: 1;
    min-width: 200px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .btn {
    padding: 8px 16px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--bg);
    font-weight: 600;
  }
  .btn-primary:hover { background: #d4b43a; border-color: #d4b43a; color: var(--bg); }

  .btn-danger {
    border-color: var(--danger);
    color: var(--danger);
  }
  .btn-danger:hover { background: rgba(232,74,74,0.1); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 560px;
    max-width: 95vw;
    max-height: 88vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    padding: 18px 22px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1.5px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 22px;
    line-height: 1;
    padding: 2px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 20px 22px; overflow-y: auto; flex: 1; }
  .modal-footer {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }

  /* FORM */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }

  .edit-roster-list { display: flex; flex-direction: column; gap: 6px; }

  .edit-roster-item {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
  }

  .edit-roster-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 18px;
  }

  .edit-roster-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .edit-roster-input::placeholder { color: var(--muted); }

  .edit-roster-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .edit-roster-remove:hover { color: var(--danger); }

  .ptbn-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 1px 4px;
    border-radius: 2px;
    background: rgba(232,200,74,0.15);
    color: var(--accent);
    border: 1px solid rgba(232,200,74,0.3);
    white-space: nowrap;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .stat-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-chip-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--accent);
    line-height: 1;
  }

  .stat-chip-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* color palette for owners */
  .c0 { background: #4ae8a0; }
  .c1 { background: #e8c84a; }
  .c2 { background: #4a9ee8; }
  .c3 { background: #e84a8a; }
  .c4 { background: #a04ae8; }
  .c5 { background: #e8724a; }
  .c6 { background: #4ae8d4; }
  .c7 { background: #e84a4a; }
  .c8 { background: #98e84a; }
  .c9 { background: #e8b04a; }
  .c10 { background: #4a6ee8; }
  .c11 { background: #e84ac4; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .tab-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .tab-btn {
    padding: 10px 20px;
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }

  .tab-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .tab-btn:hover:not(.active) { color: var(--text); }

  /* ===== DRAFT ROOM ===== */
  .draft-room { display: flex; gap: 0; height: 100%; overflow: hidden; }

  .db-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .db-toolbar {
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
    flex-shrink: 0;
  }

  .db-toolbar-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .db-search {
    flex: 1;
    min-width: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
  }
  .db-search:focus { border-color: var(--accent); }
  .db-search::placeholder { color: var(--muted); }

  .db-filter {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    outline: none;
    cursor: pointer;
  }
  .db-filter:focus { border-color: var(--accent); }

  .db-upload-btn {
    padding: 7px 14px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: var(--bg);
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .db-upload-btn:hover { background: #d4b43a; }

  .db-stats-row {
    display: flex;
    gap: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .db-stat-pill span { color: var(--accent2); font-weight: 600; }

  .db-table-wrap { flex: 1; overflow-y: auto; }

  table.prospect-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  table.prospect-table thead { position: sticky; top: 0; z-index: 10; }

  table.prospect-table th {
    background: var(--surface2);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 9px 10px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
    user-select: none;
  }
  table.prospect-table th:hover { color: var(--accent); }
  table.prospect-table th.sorted { color: var(--accent); }

  table.prospect-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(42,47,61,0.5);
    vertical-align: middle;
  }

  table.prospect-table tr:hover td { background: var(--surface2); cursor: pointer; }

  table.prospect-table tr.drafted td {
    opacity: 0.38;
  }
  table.prospect-table tr.drafted td .prospect-name { text-decoration: line-through; }

  table.prospect-table tr.row-selected td {
    background: rgba(232, 200, 74, 0.08) !important;
    border-left: 2px solid var(--accent);
  }
  table.prospect-table tr.row-selected td:first-child { padding-left: 8px; }

  /* Detail panel layout fix — keep draft button always in view */
  .detail-panel {
    display: flex;
    flex-direction: column;
  }
  .detail-draft-section {
    padding: 16px 20px 20px;
    margin-top: auto;
    border-top: 1px solid var(--border);
  }

  .rank-cell {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--accent);
    width: 40px;
    text-align: center;
  }

  .prospect-name { font-weight: 500; color: var(--text); }
  .prospect-org { color: var(--muted); font-size: 11px; margin-top: 1px; }

  .pos-badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(74,158,232,0.15);
    color: #4a9ee8;
    border: 1px solid rgba(74,158,232,0.3);
    white-space: nowrap;
  }

  .level-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .lvl-AAA { background: rgba(232,200,74,0.15); color: var(--accent); border: 1px solid rgba(232,200,74,0.3); }
  .lvl-AA  { background: rgba(74,232,160,0.12); color: var(--accent2); border: 1px solid rgba(74,232,160,0.25); }
  .lvl-Ap  { background: rgba(164,74,232,0.12); color: #a04ae8; border: 1px solid rgba(164,74,232,0.25); }

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <span class="modal-title" id="loginModalTitle">Sign In</span>
      <button class="modal-close" onclick="closeModal('loginModal')">×</button>
    </div>
    <!-- SIGN IN PANEL -->
    <div id="loginPanel">
      <div class="modal-body">
        <div class="login-error" id="loginError">Incorrect username or password.</div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input class="form-input" id="loginUsername" placeholder="username" autocomplete="username"
            onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input class="form-input" id="loginPassword" type="password" placeholder="password" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <div style="text-align:center;margin-top:4px">
          <a href="#" style="font-size:12px;color:var(--muted);text-decoration:none" onclick="showLoginPanel('create');return false">
            Don't have an account? <span style="color:var(--accent)">Create one</span>
          </a>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn" onclick="closeModal('loginModal')">Cancel</button>
        <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      </div>
    </div>
    <!-- CREATE ACCOUNT PANEL -->

<script>
// ===== AUTH =====
const AUTH_KEY = 'farmLeagueAuth2026';
const SESSION_KEY = 'farmLeagueSession2026';
const ACTIVITY_KEY = 'farmLeagueActivity2026';
const PROPOSALS_KEY = 'farmLeagueProposals2026';

function defaultAuthData() {
  return {
    users: [
      { username: 'admin', password: 'admin2026', email: '', role: 'admin', ownerId: null },
      { username: 'zacpoole', password: 'admin', email: '', role: 'admin', ownerId: 11 }
    ]
  };
}

function loadAuthData() {
  try {
    const stored = localStorage.getItem(AUTH_KEY);
    if (stored) return JSON.parse(stored);
  } catch(e) {}
  return defaultAuthData();
}

function saveAuthData(data) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(data));
}

let authData = loadAuthData();

// Ensure built-in accounts always exist
(function migrateAuthData() {
  const builtIn = [
    { username: 'admin',    password: 'admin2026', email: '', role: 'admin', ownerId: null },
    { username: 'zacpoole', password: 'admin',     email: '', role: 'admin', ownerId: 11   }
  ];
  let changed = false;
  builtIn.forEach(def => {
    if (!authData.users.find(u => u.username === def.username)) {
      authData.users.push(def);
      changed = true;
    }
  });
  if (changed) saveAuthData(authData);
})();
let currentUser = null;

function initSession() {
  try {
    const s = sessionStorage.getItem(SESSION_KEY);
    if (s) {
      const username = JSON.parse(s);
      const user = authData.users.find(u => u.username === username);
      if (user) { currentUser = user; return true; }
    }
  } catch(e) {}
  return false;
}

function openLoginModal() {
  showLoginPanel('signin');
  document.getElementById('loginModal').classList.add('open');
  setTimeout(() => document.getElementById('loginUsername').focus(), 50);
}

function showLoginPanel(which) {
  const isCreate = which === 'create';
  document.getElementById('loginModalTitle').textContent = isCreate ? 'Create Account' : 'Sign In';
  document.getElementById('loginPanel').style.display = isCreate ? 'none' : 'block';
  document.getElementById('createPanel').style.display = isCreate ? 'block' : 'none';
  if (!isCreate) {
    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginError').classList.remove('show');
  } else {
    document.getElementById('createUsername').value = '';
    document.getElementById('createEmail').value = '';
    document.getElementById('createPassword').value = '';
    document.getElementById('createConfirm').value = '';
    document.getElementById('createError').classList.remove('show');
  }
}

function doCreateAccount() {
  const username = document.getElementById('createUsername').value.trim();
  const email = document.getElementById('createEmail').value.trim();
  const password = document.getElementById('createPassword').value;
  const confirm = document.getElementById('createConfirm').value;
  const errEl = document.getElementById('createError');
  const showErr = msg => { errEl.textContent = msg; errEl.classList.add('show'); };

  if (!username) { showErr('Username is required.'); return; }
  if (authData.users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
    showErr('Username already taken. Choose another.'); return;
  }
  if (password.length < 4) { showErr('Password must be at least 4 characters.'); return; }
  if (password !== confirm) { showErr('Passwords do not match.'); return; }

  const newUser = { username, password, email, role: 'user', ownerId: null };
  authData.users.push(newUser);
  saveAuthData(authData);

  currentUser = newUser;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(username));
  closeModal('loginModal');
  applyAuthUI();
  render();
}

function doLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  const user = authData.users.find(u => u.username === username && u.password === password);
  if (!user) {
    err.classList.add('show');
    return;
  }
  err.classList.remove('show');
  currentUser = user;
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(user.username));
  closeModal('loginModal');
  applyAuthUI();
  render();
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem(SESSION_KEY);
  applyAuthUI();
  render();
}

function isAdmin() { return currentUser && currentUser.role === 'admin'; }

function canEditOwner(ownerId) {
  if (!currentUser) return false;
  if (isAdmin()) return true;
  return currentUser.ownerId === ownerId;
}

function applyAuthUI() {
  const loggedIn = !!currentUser;
  document.getElementById('signInBtn').style.display = loggedIn ? 'none' : 'block';
  document.getElementById('logoutBtn').style.display = loggedIn ? 'block' : 'none';
  document.getElementById('userChip').style.display = loggedIn ? 'flex' : 'none';
  document.getElementById('addPlayerBtn').style.display = (loggedIn && isAdmin()) ? 'block' : 'none';
  document.getElementById('btnAdmin').style.display = (loggedIn && isAdmin()) ? 'inline-block' : 'none';

  if (loggedIn) {
    const i = leagueData.owners.findIndex(o => o.id === currentUser.ownerId);
    const colorClass = i >= 0 ? OWNER_COLORS[i % 12] : 'c1';
    document.getElementById('userChipAvatar').className = `user-chip-avatar ${colorClass}`;
    document.getElementById('userChipAvatar').textContent = currentUser.username[0].toUpperCase();
    document.getElementById('userChipName').textContent = currentUser.username;
    document.getElementById('userChipRole').textContent = isAdmin() ? '· admin' : '';
  }
}

// ===== CHANGE PASSWORD =====
function openChangePasswordModal() {
  document.getElementById('cpCurrent').value = '';
  document.getElementById('cpNew').value = '';
  document.getElementById('cpConfirm').value = '';
  document.getElementById('cpError').style.display = 'none';
  document.getElementById('changePasswordModal').classList.add('open');
}

function doChangePassword() {
  const current = document.getElementById('cpCurrent').value;
  const next = document.getElementById('cpNew').value;
  const confirm = document.getElementById('cpConfirm').value;
  const errEl = document.getElementById('cpError');
  const show = msg => { errEl.textContent = msg; errEl.style.display = 'block'; };

  if (current !== currentUser.password) { show('Current password is incorrect.'); return; }
  if (next.length < 4) { show('New password must be at least 4 characters.'); return; }
  if (next !== confirm) { show('Passwords do not match.'); return; }

  const user = authData.users.find(u => u.username === currentUser.username);
  user.password = next;
  currentUser.password = next;
  saveAuthData(authData);
  closeModal('changePasswordModal');
  alert('Password updated.');
}

// ===== ADMIN PANEL =====
function renderAdminPanel(content) {
  content.style.padding = '24px';
  content.style.overflow = 'auto';
  content.style.display = 'block';

  const ownerOptions = (selected) =>
    `<option value="">— No Team —</option>` +
    leagueData.owners.map(o =>
      `<option value="${o.id}" ${selected===o.id?'selected':''}>${o.name}</option>`
    ).join('');

  const userRows = authData.users.map((u, idx) => {
    const isAdminUser = u.role === 'admin';
    return `
      <div class="admin-user-row">
        ${isAdminUser ? `<span class="admin-user-badge">ADMIN</span>` : ''}
        <input class="form-input" style="flex:1;min-width:80px" placeholder="username"
          value="${u.username}" onchange="updateAdminUser(${idx},'username',this.value)" />
        <input class="form-input" style="flex:1;min-width:120px" placeholder="email"
          value="${u.email||''}" onchange="updateAdminUser(${idx},'email',this.value)" />
        <input class="form-input" style="flex:1;min-width:110px" type="password" placeholder="password"
          value="${u.password}" onchange="updateAdminUser(${idx},'password',this.value)" />
        <select class="form-input" style="flex:1;min-width:110px"
          onchange="updateAdminUser(${idx},'ownerId',this.value===''?null:parseInt(this.value))">
          ${ownerOptions(u.ownerId)}
        </select>
        ${isAdminUser ? '' : `<button class="admin-user-remove" onclick="removeAdminUser(${idx})" title="Remove user">×</button>`}
      </div>`;
  }).join('');

  const proposals = loadProposals();
  const pending = proposals.filter(p => p.status === 'pending');
  const resolved = proposals.filter(p => p.status !== 'pending');

  const fmtDate = ts => new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})
    + ' ' + new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  const proposalRows = pending.length === 0
    ? `<div style="padding:16px;color:var(--muted);font-size:13px">No pending trade proposals.</div>`
    : pending.map(p => `
        <div class="proposal-card">
          <div class="proposal-header">
            <span class="proposal-who">Proposed by <strong>${p.proposedBy}</strong></span>
            <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${fmtDate(p.ts)}</span>
          </div>
          <div class="proposal-sides">
            <div class="proposal-side">
              <div class="proposal-owner">${p.side1.ownerName} sends</div>
              ${p.side1.items.length ? p.side1.items.map(it => `<div class="proposal-item">${it.label}${it.type==='ptbn'?' <span class="roster-tag tag-ptbn" style="font-size:9px">PTBN</span>':''}</div>`).join('') : '<div class="proposal-item" style="color:var(--muted)">Nothing</div>'}
            </div>
            <div style="font-size:20px;color:var(--accent);align-self:center">⇄</div>
            <div class="proposal-side">
              <div class="proposal-owner">${p.side2.ownerName} sends</div>
              ${p.side2.items.length ? p.side2.items.map(it => `<div class="proposal-item">${it.label}${it.type==='ptbn'?' <span class="roster-tag tag-ptbn" style="font-size:9px">PTBN</span>':''}</div>`).join('') : '<div class="proposal-item" style="color:var(--muted)">Nothing</div>'}
            </div>
          </div>
          <div class="proposal-actions">
            <button class="btn" style="color:var(--danger);border-color:var(--danger);font-size:12px" onclick="resolveProposal(${p.id},'rejected')">Reject</button>
            <button class="btn btn-primary" style="font-size:12px" onclick="resolveProposal(${p.id},'approved')">Execute Trade</button>
          </div>
        </div>`).join('');

  const resolvedRows = resolved.length === 0 ? '' : `
    <div class="roster-section" style="margin-top:20px">
      <div class="section-title"><span>Resolved Proposals</span><span>${resolved.length}</span></div>
      ${resolved.slice(0,10).map(p => `
        <div style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border)">
          <span class="activity-badge" style="background:${p.status==='approved'?'#4ae8a020':'#e84a4a20'};color:${p.status==='approved'?'var(--accent2)':'var(--danger)'};border:1px solid ${p.status==='approved'?'#4ae8a040':'#e84a4a40'}">${p.status.toUpperCase()}</span>
          <span style="font-size:13px;flex:1">${p.side1.ownerName} ↔ ${p.side2.ownerName}</span>
          <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${p.proposedBy} · ${fmtDate(p.ts)}</span>
        </div>`).join('')}
    </div>`;

  content.innerHTML = `
    <div class="admin-view">
      ${pending.length > 0 ? `
        <div class="roster-section" style="margin-bottom:20px;border-color:var(--accent)">
          <div class="section-title" style="color:var(--accent)">
            <span>⚠ Pending Trade Proposals</span>
            <span style="background:var(--accent);color:var(--bg);padding:1px 8px;border-radius:10px;font-size:11px">${pending.length}</span>
          </div>
          <div style="padding:12px;display:flex;flex-direction:column;gap:12px">${proposalRows}</div>
        </div>` : ''}
      <div class="stats-bar" style="margin-bottom:24px">
        <div class="stat-chip">
          <div class="stat-chip-val">${authData.users.length}</div>
          <div class="stat-chip-label">Users</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val">${authData.users.filter(u=>u.ownerId!==null).length}</div>
          <div class="stat-chip-label">Linked</div>
        </div>
        <div class="stat-chip">
          <div class="stat-chip-val">${leagueData.owners.length - authData.users.filter(u=>u.ownerId!==null).length}</div>
          <div class="stat-chip-label">Unlinked Teams</div>
        </div>
      </div>

      <div class="roster-section" style="margin-bottom:20px">
        <div class="section-title">
          <span>User Accounts</span>
          <button class="btn" style="font-size:11px;padding:4px 10px" onclick="addAdminUser()">+ Add User</button>
        </div>
        <div style="padding:16px">
          <div style="display:flex;gap:10px;margin-bottom:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;padding:0 4px">
            <span style="flex:1;min-width:80px">USERNAME</span>
            <span style="flex:1;min-width:120px">EMAIL</span>
            <span style="flex:1;min-width:110px">PASSWORD</span>
            <span style="flex:1;min-width:110px">LINKED TEAM</span>
            <span style="width:28px"></span>
          </div>
          <div class="admin-user-list">${userRows}</div>
          <button class="btn btn-primary" style="width:100%;margin-top:4px" onclick="saveAdminUsers()">Save Changes</button>
        </div>
      </div>

      <div class="roster-section">
        <div class="section-title"><span>Team — Owner Mapping</span></div>
        <div style="padding:0">
          ${leagueData.owners.map((o, i) => {
            const linked = authData.users.find(u => u.ownerId === o.id);
            return `
              <div class="roster-full-item">
                <div class="owner-avatar ${OWNER_COLORS[i%12]}" style="border-radius:6px;flex-shrink:0">${o.name[0]}</div>
                <div class="roster-full-name">${o.name}</div>
                ${linked
                  ? `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--accent2)">${linked.username}${linked.email?' · '+linked.email:''}</span>`
                  : `<span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">— not linked —</span>`}
              </div>`;
          }).join('')}
        </div>
      </div>

      <div style="margin-top:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px">
        <div class="admin-section-title">My Account</div>
        <button class="btn" onclick="openChangePasswordModal()">Change My Password</button>
      </div>

      <div style="margin-top:20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px">
        <div class="admin-section-title">Import / Export</div>
        <p style="font-size:12px;color:var(--muted);margin-bottom:14px;line-height:1.5">
          Export saves all league data, user accounts, trade proposals, and activity log to a single JSON file.
          Import restores from a previously exported file — this will overwrite current data.
        </p>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
          <button class="btn btn-primary" onclick="exportLeagueData()">⬇ Export League Data</button>
          <label class="btn" style="cursor:pointer;margin:0">
            ⬆ Import League Data
            <input type="file" accept=".json" style="display:none" onchange="importLeagueData(event)" />

// ===== ACTIVITY LOG =====
function logActivity(type, details) {
  let log = [];
  try { log = JSON.parse(localStorage.getItem(ACTIVITY_KEY) || '[]'); } catch(e) {}
  log.unshift({
    ts: Date.now(),
    type,
    actor: currentUser ? currentUser.username : 'system',
    details
  });
  if (log.length > 200) log = log.slice(0, 200);
  localStorage.setItem(ACTIVITY_KEY, JSON.stringify(log));
}

function renderActivityLog(content) {
  content.style.padding = '24px';
  content.style.overflow = 'auto';
  content.style.display = 'block';

  let log = [];
  try { log = JSON.parse(localStorage.getItem(ACTIVITY_KEY) || '[]'); } catch(e) {}

  const TYPE_META = {
    trade:    { label: 'TRADE',  color: '#e8c84a' },
    add:      { label: 'ADD',    color: '#4ae8a0' },
    drop:     { label: 'DROP',   color: '#e84a4a' },
    draft:    { label: 'DRAFT',  color: '#4ab8e8' },
    undraft:  { label: 'UNDRAFT',color: '#e88c4a' },
    roster:   { label: 'ROSTER', color: '#a04ae8' },
  };

  const fmtDate = ts => {
    const d = new Date(ts);
    return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' })
      + ' ' + d.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
  };

  const rows = log.length === 0
    ? `<div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">No activity recorded yet.</div>`
    : log.map(entry => {
        const m = TYPE_META[entry.type] || { label: entry.type.toUpperCase(), color: 'var(--muted)' };
        return `
          <div class="activity-entry">
            <span class="activity-badge" style="background:${m.color}20;color:${m.color};border:1px solid ${m.color}40">${m.label}</span>
            <div class="activity-details">${entry.details}</div>
            <div class="activity-meta">
              <span>${entry.actor}</span>
              <span>${fmtDate(entry.ts)}</span>
            </div>
          </div>`;
      }).join('');

  content.innerHTML = `
    <div style="max-width:720px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--accent)">Activity Log</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">${log.length} event${log.length !== 1 ? 's' : ''} recorded</div>
        </div>
        ${isAdmin() ? `<button class="btn" style="color:var(--danger);border-color:var(--danger)" onclick="clearActivityLog()">Clear Log</button>` : ''}
      </div>
      <div class="activity-feed">${rows}</div>
    </div>`;
}

function clearActivityLog() {
  if (!confirm('Clear the entire activity log?')) return;
  localStorage.removeItem(ACTIVITY_KEY);
  renderActivityLog(document.getElementById('mainContent'));
}

// ===== IMPORT / EXPORT =====
function exportLeagueData() {
  const snapshot = {
    version: 1,
    exportedAt: new Date().toISOString(),
    exportedBy: currentUser.username,
    leagueData,
    authData,
    proposals: loadProposals(),
    activityLog: JSON.parse(localStorage.getItem(ACTIVITY_KEY) || '[]')
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const dateStr = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `farm-league-backup-${dateStr}.json`;
  a.click();
  URL.revokeObjectURL(url);
  logActivity('roster', `League data exported by <strong>${currentUser.username}</strong>`);
}

function importLeagueData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('importStatus');
  const show = (msg, ok) => {
    statusEl.style.display = 'block';
    statusEl.style.color = ok ? 'var(--accent2)' : 'var(--danger)';
    statusEl.textContent = msg;
  };

  const reader = new FileReader();
  reader.onload = function(e) {
    let snapshot;
    try {
      snapshot = JSON.parse(e.target.result);
    } catch(err) {
      show('Invalid JSON file — could not parse.', false);
      return;
    }

    // Basic validation
    if (!snapshot.leagueData || !Array.isArray(snapshot.leagueData.owners)) {
      show('File does not appear to be a valid Farm League export.', false);
      return;
    }
    if (!confirm(`Import backup from ${snapshot.exportedAt ? new Date(snapshot.exportedAt).toLocaleString() : 'unknown date'}?\n\nThis will overwrite all current league data, rosters, picks, proposals, and the activity log.`)) {
      show('Import cancelled.', false);
      event.target.value = '';
      return;
    }

    leagueData = snapshot.leagueData;
    save();

    if (snapshot.authData && Array.isArray(snapshot.authData.users)) {
      authData = snapshot.authData;
      saveAuthData(authData);
      // Re-validate current session against imported auth
      if (currentUser) {
        const stillValid = authData.users.find(u => u.username === currentUser.username && u.password === currentUser.password);
        if (!stillValid) { currentUser = null; sessionStorage.removeItem(SESSION_KEY); }
        else currentUser = stillValid;
      }
    }
    if (Array.isArray(snapshot.proposals)) {
      saveProposals(snapshot.proposals);
    }
    if (Array.isArray(snapshot.activityLog)) {
      localStorage.setItem(ACTIVITY_KEY, JSON.stringify(snapshot.activityLog));
    }

    logActivity('roster', `League data imported from backup (${snapshot.exportedAt ? snapshot.exportedAt.slice(0,10) : 'unknown date'}) by <strong>${currentUser?.username || 'admin'}</strong>`);
    show(`Import successful! Restored ${leagueData.owners.length} teams from ${snapshot.exportedAt ? new Date(snapshot.exportedAt).toLocaleDateString() : 'backup'}.`, true);
    applyAuthUI();
    render();
  };
  reader.readAsText(file);
  event.target.value = ''; // reset so same file can be re-imported if needed
}

// ===== PROPOSALS =====
function loadProposals() {
  try { return JSON.parse(localStorage.getItem(PROPOSALS_KEY) || '[]'); } catch(e) { return []; }
}
function saveProposals(proposals) {
  localStorage.setItem(PROPOSALS_KEY, JSON.stringify(proposals));
}

function proposeTrade() {
  const s1 = tradeState.side1;
  const s2 = tradeState.side2;
  if (s1.ownerId === s2.ownerId) { alert('Select two different owners.'); return; }
  if (s1.items.length === 0 && s2.items.length === 0) { alert('Add items to the trade.'); return; }

  const owner1 = leagueData.owners.find(o => o.id === s1.ownerId);
  const owner2 = leagueData.owners.find(o => o.id === s2.ownerId);

  const proposals = loadProposals();
  proposals.push({
    id: Date.now(),
    ts: Date.now(),
    proposedBy: currentUser.username,
    status: 'pending',
    side1: { ownerId: s1.ownerId, ownerName: owner1.name, items: [...s1.items] },
    side2: { ownerId: s2.ownerId, ownerName: owner2.name, items: [...s2.items] }
  });
  saveProposals(proposals);
  logActivity('trade', `<strong>${currentUser.username}</strong> proposed a trade: ${owner1.name} ↔ ${owner2.name} (pending review)`);
  closeModal('tradeModal');
  render();
  alert(`✅ Trade proposal submitted! An admin will review it.`);
}

function resolveProposal(id, status) {
  const proposals = loadProposals();
  const prop = proposals.find(p => p.id === id);
  if (!prop) return;

  if (status === 'approved') {
    const owner1 = leagueData.owners.find(o => o.id === prop.side1.ownerId);
    const owner2 = leagueData.owners.find(o => o.id === prop.side2.ownerId);
    if (!owner1 || !owner2) { alert('Could not find one or both owners.'); return; }

    prop.side1.items.forEach(it => {
      if (it.type === 'player') {
        owner1.roster = owner1.roster.filter(p => p !== it.label);
        owner2.roster.push(it.label);
      } else {
        owner1.ptbn = owner1.ptbn.filter(p => p !== it.label);
        owner2.ptbn.push(it.label);
      }
    });
    prop.side2.items.forEach(it => {
      if (it.type === 'player') {
        owner2.roster = owner2.roster.filter(p => p !== it.label);
        owner1.roster.push(it.label);
      } else {
        owner2.ptbn = owner2.ptbn.filter(p => p !== it.label);
        owner1.ptbn.push(it.label);
      }
    });

    const s1Summary = prop.side1.items.map(i => i.label).join(', ') || 'nothing';
    const s2Summary = prop.side2.items.map(i => i.label).join(', ') || 'nothing';
    logActivity('trade', `<strong>${owner1.name}</strong> receives ${s2Summary} · <strong>${owner2.name}</strong> receives ${s1Summary} (approved by ${currentUser.username})`);
    save();
  } else {
    logActivity('trade', `Trade proposal by <strong>${prop.proposedBy}</strong> (${prop.side1.ownerName} ↔ ${prop.side2.ownerName}) rejected by ${currentUser.username}`);
  }

  prop.status = status;
  prop.resolvedBy = currentUser.username;
  prop.resolvedTs = Date.now();
  saveProposals(proposals);
  render();
}

// ===== TRADE MODAL =====
function openTradeModal() {
  // Pre-select the logged-in user's team as side1 if they have one
  const myOwnerId = currentUser?.ownerId;
  const defaultSide1 = myOwnerId != null ? myOwnerId : leagueData.owners[0].id;
  const defaultSide2 = leagueData.owners.find(o => o.id !== defaultSide1)?.id ?? leagueData.owners[1].id;
  tradeState = {
    side1: { ownerId: defaultSide1, items: [] },
    side2: { ownerId: defaultSide2, items: [] }
  };
  document.getElementById('tradeModalTitle').textContent = isAdmin() ? 'Trade Builder' : 'Propose Trade';
  renderTradeModal();
  document.getElementById('tradeModal').classList.add('open');
}

function renderTradeModal() {
  const body = document.getElementById('tradeModalBody');
  const ownerOptions = leagueData.owners.map(o => `<option value="${o.id}">${o.name}</option>`).join('');

  const buildSide = (side, label) => {
    const s = tradeState[side];
    const owner = leagueData.owners.find(o => o.id === s.ownerId);
    const allItems = [...owner.roster.map((p,i) => ({type:'player',label:p,idx:i})), ...owner.ptbn.map((p,i) => ({type:'ptbn',label:p,idx:i}))];
    const selected = s.items.map(it => `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:5px 10px;font-size:12px;display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">${it.label}<button onclick="removeTradeSideItem('${side}','${it.label}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px">×</button></div>`).join('');
    const options = allItems.filter(it => !s.items.find(si => si.label === it.label)).map(it => `<option value="${it.type}|||${it.idx}|||${it.label}">${it.label}${it.type==='ptbn'?' [PTBN]':''}</option>`).join('');
    return `
      <div style="flex:1;min-width:0">
        <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:1px">${label}</div>
        <select class="form-input" onchange="changeTradeSideOwner('${side}',this.value)">${leagueData.owners.map(o=>`<option value="${o.id}" ${o.id===s.ownerId?'selected':''}>${o.name}</option>`).join('')}</select>
        <div style="margin-top:10px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:6px">SENDING:</div>
        ${selected || '<div style="color:var(--muted);font-size:12px;padding:4px 0">Nothing selected</div>'}
        <select class="form-input" style="margin-top:8px;font-size:12px" onchange="addTradeSideItem('${side}',this)">
          <option value="">+ Pick item to include…</option>
          ${options}
        </select>
      </div>`;
  };

  body.innerHTML = `
    <div style="display:flex;gap:16px;align-items:flex-start">
      ${buildSide('side1','SIDE A')}
      <div style="display:flex;align-items:center;padding-top:30px;font-size:22px;color:var(--accent);flex-shrink:0">⇄</div>
      ${buildSide('side2','SIDE B')}
    </div>`;

  const footer = document.getElementById('tradeModalFooter');
  footer.innerHTML = `
    <button class="btn" onclick="closeModal('tradeModal')">Cancel</button>
    <div style="display:flex;gap:8px">
      <button class="btn" onclick="proposeTrade()" style="color:var(--accent2);border-color:var(--accent2)">Propose Trade</button>
      ${isAdmin() ? `<button class="btn btn-primary" onclick="executeTrade()">Execute Trade</button>` : ''}
    </div>`;
}

function changeTradeSideOwner(side, ownerId) {
  tradeState[side].ownerId = parseInt(ownerId);
  tradeState[side].items = [];
  renderTradeModal();
}

function addTradeSideItem(side, sel) {
  const val = sel.value;
  if (!val) return;
  const [type, idx, label] = val.split('|||');
  tradeState[side].items.push({ type, idx: parseInt(idx), label });
  renderTradeModal();
}

function removeTradeSideItem(side, label) {
  tradeState[side].items = tradeState[side].items.filter(it => it.label !== label);
  renderTradeModal();
}

function executeTrade() {
  const s1 = tradeState.side1;
  const s2 = tradeState.side2;
  if (s1.ownerId === s2.ownerId) { alert('Select two different owners.'); return; }
  if (s1.items.length === 0 && s2.items.length === 0) { alert('Add items to the trade.'); return; }

  const owner1 = leagueData.owners.find(o => o.id === s1.ownerId);
  const owner2 = leagueData.owners.find(o => o.id === s2.ownerId);

  // Move s1 items to owner2
  s1.items.forEach(it => {
    if (it.type === 'player') {
      owner1.roster = owner1.roster.filter(p => p !== it.label);
      owner2.roster.push(it.label);
    } else {
      owner1.ptbn = owner1.ptbn.filter(p => p !== it.label);
      owner2.ptbn.push(it.label);
    }
  });

  // Move s2 items to owner1
  s2.items.forEach(it => {
    if (it.type === 'player') {
      owner2.roster = owner2.roster.filter(p => p !== it.label);
      owner1.roster.push(it.label);
    } else {
      owner2.ptbn = owner2.ptbn.filter(p => p !== it.label);
      owner1.ptbn.push(it.label);
    }
  });

  const s1Summary = s1.items.map(it => it.label).join(', ') || 'nothing';
  const s2Summary = s2.items.map(it => it.label).join(', ') || 'nothing';
  logActivity('trade', `<strong>${owner1.name}</strong> receives ${s2Summary} · <strong>${owner2.name}</strong> receives ${s1Summary}`);
  save();
  closeModal('tradeModal');
  render();
  alert(`✅ Trade completed between ${owner1.name} and ${owner2.name}!`);
}

// ===== SEARCH =====
let searchDebounce = null;

function openSearchModal() {
  document.getElementById('searchModal').classList.add('open');
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResults').innerHTML = '<div class="search-hint">Start typing to search all rosters</div>';
  setTimeout(() => document.getElementById('searchInput').focus(), 60);
}

function handleSearchOverlayClick(e) {
  if (e.target === document.getElementById('searchModal')) {
    closeModal('searchModal');
  }
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClear').style.display = 'none';
  document.getElementById('searchResults').innerHTML = '<div class="search-hint">Start typing to search all rosters</div>';
  document.getElementById('searchInput').focus();
}

function runSearch(query) {
  clearTimeout(searchDebounce);
  document.getElementById('searchClear').style.display = query ? 'block' : 'none';
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '<div class="search-hint">Start typing to search all rosters</div>';
    return;
  }
  searchDebounce = setTimeout(() => renderSearchResults(query.trim()), 120);
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx))
    + '<mark>' + escHtml(text.slice(idx, idx + query.length)) + '</mark>'
    + escHtml(text.slice(idx + query.length));
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderSearchResults(query) {
  const q = query.toLowerCase();
  const results = [];

  leagueData.owners.forEach((owner, ownerIdx) => {
    owner.roster.forEach((name, rank) => {
      if (name && name.toLowerCase().includes(q)) {
        results.push({ type: 'player', name, rank: rank + 1, owner, ownerIdx });
      }
    });
    owner.ptbn.forEach(name => {
      if (name && name.toLowerCase().includes(q)) {
        results.push({ type: 'ptbn', name, rank: '—', owner, ownerIdx });
      }
    });
    // Also match owner names themselves
    if (owner.name.toLowerCase().includes(q)) {
      results.push({ type: 'owner', name: owner.name + "'s Farm Team", rank: '', owner, ownerIdx });
    }
  });

  const container = document.getElementById('searchResults');
  if (results.length === 0) {
    container.innerHTML = `<div class="search-empty">No results for "<strong>${escHtml(query)}</strong>"</div>`;
    return;
  }

  const players = results.filter(r => r.type === 'player');
  const ptbns   = results.filter(r => r.type === 'ptbn');
  const owners  = results.filter(r => r.type === 'owner');

  const buildItems = (list) => list.map((r, idx) => {
    const globalIdx = results.indexOf(r);
    const color = OWNER_COLORS[r.ownerIdx % 12];
    return `
      <div class="search-result-item" data-idx="${globalIdx}" onclick="searchNavigate(${r.owner.id}, '${r.type}')">
        <span class="search-result-rank">${r.type === 'owner' ? `<div class="owner-avatar ${color}" style="width:22px;height:22px;font-size:10px;border-radius:4px">${r.owner.name[0]}</div>` : r.rank}</span>
        <span class="search-result-name">${highlightMatch(r.name, query)}</span>
        ${r.type !== 'owner' ? `<span class="search-result-owner">${r.owner.name}</span>` : ''}
        ${r.type === 'ptbn' ? `<span class="roster-tag tag-ptbn" style="font-size:9px">PTBN</span>` : ''}
      </div>`;
  }).join('');

  let html = '';
  if (owners.length)  html += `<div class="search-group-label">Owners</div>${buildItems(owners)}`;
  if (players.length) html += `<div class="search-group-label">Prospects</div>${buildItems(players)}`;
  if (ptbns.length)   html += `<div class="search-group-label">PTBN Picks</div>${buildItems(ptbns)}`;
  html += `<div class="search-result-count">${results.length} result${results.length !== 1 ? 's' : ''}</div>`;

  container.innerHTML = html;
}

function searchNavigate(ownerId, type) {
  closeModal('searchModal');
  selectOwner(ownerId);
}

function handleSearchKey(e) {
  if (e.key === 'Escape') { closeModal('searchModal'); return; }
  const items = document.querySelectorAll('.search-result-item');
  if (!items.length) return;
  const focused = document.querySelector('.search-result-item.focused');
  let idx = focused ? [...items].indexOf(focused) : -1;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    items[idx >= 0] && items[idx].classList.remove('focused');
    idx = Math.min(idx + 1, items.length - 1);
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focused && focused.classList.remove('focused');
    idx = Math.max(idx - 1, 0);
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && focused) {
    focused.click();
  }
}

let dbSortCol  = 'Rank';
let dbSortAsc  = true;
let dbSearch   = '';
let dbPosFilter = '';
let dbLevelFilter = '';
let dbStatusFilter = '';
let selectedProspect = null;

function getAllDraftedNames() {
  const names = new Set();
  leagueData.owners.forEach(o => o.roster.forEach(p => { if (p) names.add(p.trim().toLowerCase()); }));
  return names;
}

function isProspectDrafted(name) {
  return getAllDraftedNames().has(name.trim().toLowerCase());
}

function getProspectOwner(name) {
  const key = name.trim().toLowerCase();
  return leagueData.owners.find(o => o.roster.some(p => p && p.trim().toLowerCase() === key)) || null;
}

function levelClass(lvl) {
  if (!lvl) return 'lvl-R';
  const l = String(lvl).trim();
  if (l === 'AAA') return 'lvl-AAA';
  if (l === 'AA')  return 'lvl-AA';
  if (l === 'A+')  return 'lvl-Ap';
  if (l === 'A')   return 'lvl-A';
  return 'lvl-R';
}

function renderDraftRoom(content) {
  // Reset content styles set by draft room on every render
  content.style.padding = '';
  content.style.overflow = '';
  content.style.display = '';

  if (prospectDB.length === 0) {
    content.style.padding = '24px';
    content.innerHTML = `
      <div class="no-db-state">
        <div class="no-db-icon">⚾</div>
        <div class="no-db-title">No Prospect Database Loaded</div>
        <div class="no-db-sub">Upload your Excel prospect database (.xlsx) to enable the draft room.</div>
        <label class="db-upload-btn" style="margin-top:8px;display:inline-block">
          📂 Upload Database
          <input type="file" accept=".xlsx" style="display:none" onchange="handleDBUpload(event)">
        </label>
      </div>`;
    return;
  }

  // Apply draft room layout
  content.style.padding = '0';
  content.style.overflow = 'hidden';
  content.style.display = 'flex';

  const drafted = getAllDraftedNames();
  const positions = [...new Set(prospectDB.map(p => p.Position).filter(Boolean))].sort();

  // Filter
  let filtered = prospectDB.filter(p => {
    const q = dbSearch.toLowerCase();
    const nameMatch = !dbSearch
      || (p.Name||'').toLowerCase().includes(q)
      || (p['MLB Org']||'').toLowerCase().includes(q)
      || (p.Position||'').toLowerCase().includes(q);
    const posMatch    = !dbPosFilter || p.Position === dbPosFilter;
    const statusMatch = !dbStatusFilter
      || (dbStatusFilter === 'available' && !drafted.has((p.Name||'').toLowerCase()))
      || (dbStatusFilter === 'drafted'   &&  drafted.has((p.Name||'').toLowerCase()));
    return nameMatch && posMatch && statusMatch;
  });

  // Sort
  filtered.sort((a, b) => {
    let av = a[dbSortCol], bv = b[dbSortCol];
    if (typeof av === 'number' && typeof bv === 'number') return dbSortAsc ? av - bv : bv - av;
    return dbSortAsc
      ? String(av||'').localeCompare(String(bv||''))
      : String(bv||'').localeCompare(String(av||''));
  });

  const availCount   = prospectDB.filter(p => !drafted.has((p.Name||'').toLowerCase())).length;
  const draftedCount = prospectDB.length - availCount;
  const posOptions   = positions.map(p => `<option value="${p}" ${dbPosFilter===p?'selected':''}>${p}</option>`).join('');

  // Table columns — drop Level/ETA since DB doesn't have them, remove duplicate Org column
  const cols = [
    { key: 'Rank',     label: 'RK' },
    { key: 'Name',     label: 'Player' },
    { key: 'Position', label: 'POS' },
    { key: 'MLB Org',  label: 'ORG' },
    { key: 'Status',   label: 'Status' },
  ];

  const thHtml = cols.map(c => {
    const isSorted = dbSortCol === c.key;
    const arrow = isSorted ? (dbSortAsc ? ' ↑' : ' ↓') : '';
    return `<th class="${isSorted?'sorted':''}" onclick="dbSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');

  const rowsHtml = filtered.map(p => {
    const isDrafted  = drafted.has((p.Name||'').toLowerCase());
    const owner      = isDrafted ? getProspectOwner(p.Name) : null;
    const ownerIdx   = owner ? leagueData.owners.indexOf(owner) : -1;
    const isSelected = selectedProspect && selectedProspect.Name === p.Name;

    const statusCell = isDrafted
      ? `<span class="drafted-badge">${owner ? owner.name : 'Drafted'}</span>`
      : `<span class="available-badge">Available</span>`;

    return `<tr class="${isDrafted?'drafted':''} ${isSelected?'row-selected':''}"
               onclick="selectProspect(${JSON.stringify(JSON.stringify(p))})">
      <td class="rank-cell">${p.Rank||'—'}</td>
      <td>
        <div class="prospect-name">${p.Name||'—'}</div>
      </td>
      <td><span class="pos-badge">${p.Position||'—'}</span></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${p['MLB Org']||'—'}</td>
      <td>${statusCell}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <div style="flex:1;display:flex;overflow:hidden">
      <div class="db-panel">
        <div class="db-toolbar">
          <div class="db-toolbar-row">
            <input class="db-search" placeholder="Search name, org, position…" value="${dbSearch}"
              oninput="dbSearch=this.value;renderDraftRoom(document.getElementById('mainContent'))">
            <select class="db-filter" onchange="dbPosFilter=this.value;renderDraftRoom(document.getElementById('mainContent'))">
              <option value="">All Positions</option>${posOptions}
            </select>
            <select class="db-filter" onchange="dbStatusFilter=this.value;renderDraftRoom(document.getElementById('mainContent'))">
              <option value="">All</option>
              <option value="available" ${dbStatusFilter==='available'?'selected':''}>Available</option>
              <option value="drafted"   ${dbStatusFilter==='drafted'?'selected':''}>Drafted</option>
            </select>
            <label class="db-upload-btn" title="Replace database with a new Excel file">
              ↑ Replace DB
              <input type="file" accept=".xlsx" style="display:none" onchange="handleDBUpload(event)">
            </label>
          </div>
          <div class="db-stats-row">
            <span class="db-stat-pill">Total: <span>${prospectDB.length}</span></span>
            <span class="db-stat-pill" style="color:var(--accent2)">Available: <span>${availCount}</span></span>
            <span class="db-stat-pill" style="color:var(--danger)">Drafted: <span>${draftedCount}</span></span>
            <span class="db-stat-pill">Showing: <span>${filtered.length}</span></span>
          </div>
        </div>
        <div class="db-table-wrap">
          <table class="prospect-table">
            <thead><tr>${thHtml}</tr></thead>
            <tbody>${rowsHtml || '<tr><td colspan="5" style="padding:24px;text-align:center;color:var(--muted);font-family:\'DM Mono\',monospace;font-size:12px">No prospects match your filters</td></tr>'}</tbody>
          </table>
        </div>
      </div>
      <div class="detail-panel" id="detailPanel">
        ${renderDetailPanel()}
      </div>
    </div>`;
}

function dbSort(col) {
  if (dbSortCol === col) dbSortAsc = !dbSortAsc;
  else { dbSortCol = col; dbSortAsc = true; }
  renderDraftRoom(document.getElementById('mainContent'));
}

function selectProspect(pJson) {
  selectedProspect = JSON.parse(pJson);
  // Just update the detail panel without re-rendering the whole table
  const panel = document.getElementById('detailPanel');
  if (panel) {
    panel.innerHTML = renderDetailPanel();
  }
  // Highlight selected row without full re-render
  document.querySelectorAll('.prospect-table tbody tr').forEach(row => {
    row.classList.remove('row-selected');
  });
  event.currentTarget.classList.add('row-selected');
}

function renderDetailPanel() {
  if (!selectedProspect) {
    return `<div class="detail-empty">
      <div class="detail-empty-icon">👆</div>
      <div>Click any prospect to view details and assign them to a team</div>
    </div>`;
  }

  const p          = selectedProspect;
  const isDrafted  = isProspectDrafted(p.Name);
  const owner      = isDrafted ? getProspectOwner(p.Name) : null;
  const ownerIdx   = owner ? leagueData.owners.indexOf(owner) : -1;

  // Build owner options showing open slot count
  const ownerOptions = leagueData.owners.map((o, i) => {
    const filled   = o.roster.filter(r => r).length;
    const open     = o.roster.filter(r => !r).length;
    const slotNote = open > 0 ? `${open} open slot${open>1?'s':''}` : 'no open slots — will append';
    return `<option value="${o.id}">${o.name} · ${filled} prospects · ${slotNote}</option>`;
  }).join('');

  let draftSection;
  if (isDrafted) {
    const avatarClass = OWNER_COLORS[ownerIdx % 12];
    draftSection = `
      <div class="detail-drafted-by">
        <div class="owner-avatar ${avatarClass}" style="width:24px;height:24px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--bg);flex-shrink:0">${owner.name[0]}</div>
        <span>On <strong>${owner.name}</strong>'s roster</span>
      </div>
      <button class="btn-undraft" onclick="undraftProspect(${JSON.stringify(p.Name)})">
        ✕ Remove from ${owner.name}'s Roster
      </button>`;
  } else {
    draftSection = `
      <div class="detail-draft-label">ASSIGN TO TEAM</div>
      <select class="detail-draft-select" id="draftTargetOwner">${ownerOptions}</select>
      <button class="btn-draft" onclick="draftProspect(${JSON.stringify(p.Name)})">
        ⚾ Draft to Roster
      </button>`;
  }

  return `
    <div class="detail-header">
      <div class="detail-rank">RANK #${p.Rank||'—'}</div>
      <div class="detail-name">${p.Name}</div>
      <div class="detail-org">${p['MLB Org']||'—'}</div>
      <div class="detail-badges">
        <span class="pos-badge">${p.Position||'—'}</span>
        ${isDrafted
          ? `<span class="drafted-badge">Drafted · ${owner.name}</span>`
          : `<span class="available-badge">Available</span>`}
      </div>
    </div>
    <div class="detail-draft-section" style="flex:1">${draftSection}</div>`;
}

function draftProspect(name) {
  const sel = document.getElementById('draftTargetOwner');
  if (!sel) return;
  const ownerId = parseInt(sel.value);
  const owner   = leagueData.owners.find(o => o.id === ownerId);
  if (!owner) return;

  // Fill first empty slot; if none, append
  const emptyIdx = owner.roster.findIndex(r => !r);
  if (emptyIdx >= 0) {
    owner.roster[emptyIdx] = name;
  } else {
    owner.roster.push(name);
  }

  logActivity('draft', `<strong>${name}</strong> drafted to ${owner.name}'s roster`);
  save();
  selectedProspect = prospectDB.find(p => p.Name === name) || selectedProspect;
  renderDraftRoom(document.getElementById('mainContent'));
}

function undraftProspect(name) {
  const owner = getProspectOwner(name);
  if (!owner) return;
  const idx = owner.roster.findIndex(r => r && r.trim().toLowerCase() === name.trim().toLowerCase());
  if (idx >= 0) owner.roster[idx] = ''; // restore as empty slot
  logActivity('undraft', `<strong>${name}</strong> removed from ${owner.name}'s roster`);
  save();
  selectedProspect = prospectDB.find(p => p.Name === name) || selectedProspect;
  renderDraftRoom(document.getElementById('mainContent'));
}

// ===== EXCEL UPLOAD =====
function handleDBUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      parseXLSX(data);
    } catch(err) {
      alert('Error reading file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function parseXLSX(data) {
  // Minimal XLSX parser — reads the shared strings and first sheet
  // Uses SheetJS if available, otherwise falls back to basic parse
  if (typeof XLSX !== 'undefined') {
    const wb = XLSX.read(data, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    prospectDB = rows.map(r => ({
      Rank:     typeof r.Rank === 'number' ? r.Rank : parseInt(r.Rank)||999,
      Name:     String(r.Name||'').trim(),
      Position: String(r.Position||'').trim(),
      'MLB Org':String(r['MLB Org']||'').trim(),
      Age:      r.Age||'',
      Level:    String(r.Level||'').trim(),
      ETA:      r.ETA||'',
      Bat:      String(r.Bat||'').trim(),
      Throw:    String(r.Throw||'').trim(),
      Notes:    String(r.Notes||'').trim(),
    })).filter(r => r.Name);
    dbSortCol = 'Rank'; dbSortAsc = true;
    selectedProspect = null;
    renderDraftRoom(document.getElementById('mainContent'));
  } else {
    alert('SheetJS library not loaded. Please refresh and try again.');
  }
}

function downloadTemplate() {
  // Create a simple CSV template for download since we can't ship binary xlsx from JS
  const headers = ['Rank','Name','Position','MLB Org','Age','Level','ETA','Bat','Throw','Notes'];
  const sample = [
    [1,'Jackson Holliday','SS','Baltimore Orioles',21,'AAA',2026,'L','R','Elite prospect, top-of-the-order bat'],
    [2,'Paul Skenes','RHP','Pittsburgh Pirates',23,'MLB',2024,'R','R','Already in majors, #1 starter upside'],
  ];
  let csv = headers.join(',') + '\n';
  sample.forEach(row => { csv += row.map(v => `"${v}"`).join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'prospect_database_template.csv';
  a.click();
}

// ===== INIT =====
initSession();
applyAuthUI();
render();
</script>
